{% extends 'base.html' %}

{% block content %}
<div class="container card-shadow" style="margin-top: 100px; margin-bottom: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='logo/the_road_library_logo.png') }}"
                             alt="The Road Library Logo" style="height: 60px;" class="mb-3">
                        <h3 class="fw-bold text-dark">Welcome Back</h3>
                        <p class="text-muted small">도(道)서관 서비스에 로그인하세요</p>
                    </div>
                    <form action="/auth/login" method="POST">

                        <div class="form-floating mb-3">
                            <input type="text" name="uid" class="form-control border-2" id="floatingInput"
                                   placeholder="ID" required style="border-radius: 12px; border-color: #dee2e6;">
                            <label for="floatingInput" class="text-muted">아이디</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" name="upw" class="form-control border-2" id="floatingPassword"
                                   placeholder="Password" required style="border-radius: 12px; border-color: #dee2e6;">
                            <label for="floatingPassword" class="text-muted">비밀번호</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm"
                                style="background-color: var(--primary-teal); border: none; transition: all 0.3s;">
                            로그인
                        </button>
                    </form>
                    <div class="mt-4 text-center">
                        <span class="text-muted small"><br>계정이 없으신가요?</span>
                        <a href="/auth/signup" class="text-decoration-none ms-1 fw-bold" style="color: #20828A;">회원가입</a>
                    </div>
                    <div class="mt-4 text-center">
                        <span class="text-muted small">비밀번호를 잊으셨나요?</span>
                        <a href="/auth/signup" class="text-decoration-none ms-1 fw-bold" style="color: #20828A;">비밀번호 찾기</a>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/" class="text-muted text-decoration-none small">
                    <i class="bi bi-arrow-left me-1"></i> 메인페이지로 돌아가기
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
